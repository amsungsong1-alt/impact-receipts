# nginx/conf.d/impactproof.conf
#
# Replace YOUR_DOMAIN_HERE (both server blocks) with your real domain before
# the first deploy. TLS bootstrap is a two-phase process -- see
# scripts/deploy_vps.sh and README.md's "Docker / VPS deployment" section:
#   1. Comment out (or don't yet reference) the ssl_certificate lines below
#      and bring Nginx up HTTP-only, so it can serve the ACME challenge.
#   2. Run the certbot bootstrap command (README.md) to obtain the first
#      certificate, then uncomment the ssl_certificate lines and reload.
# After that, a host-crontab renewal entry keeps the certificate current --
# docker-compose's `restart: unless-stopped` does NOT schedule renewal on
# its own.

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_HERE;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    # Protocol/cipher suite intentionally left at the image's built-in
    # defaults rather than hand-picked here -- verify against a current TLS
    # configuration generator (e.g. Mozilla's SSL Config Generator,
    # "intermediate" profile) before going live, and revisit periodically as
    # recommendations change.

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_proxied any;

    # Streamlit's own health endpoint -- kept out of the general rate-limit
    # zone and access log noise.
    location /_stcore/health {
        proxy_pass http://app:8501/_stcore/health;
        access_log off;
    }

    location / {
        limit_req zone=impactproof_limit burst=20 nodelay;

        proxy_pass http://app:8501;
        proxy_http_version 1.1;

        # Required -- Streamlit's core interaction model is WebSocket-based;
        # without these, the app loads but live reruns/updates silently stop
        # working.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Required -- .streamlit/config.toml sets enableXsrfProtection=true,
        # which checks the Host header on every request. Without this, every
        # request behind the proxy fails Streamlit's own XSRF check.
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived websocket -- don't let Nginx kill idle connections.
        proxy_read_timeout 86400;
    }
}
