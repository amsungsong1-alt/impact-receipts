# nginx/nginx.conf — mounted over the nginx:stable-alpine image's default at
# /etc/nginx/nginx.conf. Mirrors that image's standard structure (worker
# processes, events block, the conf.d include) with two additions: the
# limit_req_zone definition (must live in the http {} block, not in a
# per-server conf.d file) and a raised client_max_body_size for report/
# portfolio uploads (pdfplumber/python-docx/CSV portfolio files can be
# sizeable).

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    client_max_body_size 25m;  # report/CSV portfolio uploads

    # General request-rate abuse protection at the HTTP layer, independent
    # of utils.audits.check_rate_limit()'s app-level per-action limiter.
    # Tune rate/burst against real usage before relying on this in
    # production -- Streamlit's own rerun/websocket traffic generates
    # frequent small requests during normal active use, and too strict a
    # limit here reads as mysterious connection failures to legitimate users.
    limit_req_zone $binary_remote_addr zone=impactproof_limit:10m rate=10r/s;

    include /etc/nginx/conf.d/*.conf;
}
